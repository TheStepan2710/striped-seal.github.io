<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Sea of Okhotsk Prototype</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles/main.css" />
    <script type="module" src="https://unpkg.com/@material/web@2.4.0/all.js"></script>
  </head>
  <body>
    <div id="app">
      <div id="map" aria-label="Карта Охотского моря"></div>
      <canvas id="heatmap-canvas" aria-hidden="true"></canvas>

      <header class="top-controls">
        <button id="profile-btn" class="control-btn" aria-label="Профиль">👤</button>
        <div id="species-dropdown" class="species-dropdown"></div>
      </header>

      <div class="map-zoom-controls" aria-label="Управление масштабом">
        <button id="zoom-in-btn" class="zoom-btn" aria-label="Приблизить">＋</button>
        <button id="zoom-out-btn" class="zoom-btn" aria-label="Отдалить">－</button>
      </div>

      <section class="bottom-panel" aria-label="Управление слоями и датой">
        <div class="legend-card">
          <span>низкая</span>
          <div class="legend-gradient" aria-hidden="true"></div>
          <span>высокая</span>
        </div>
        <div class="timeline-row">
          <button id="today-btn" class="timeline-side-btn" aria-label="Вернуться к базовой дате">📍</button>
          <div id="timeline-scale" class="timeline-scale"></div>
          <button id="calendar-btn" class="timeline-side-btn" aria-label="Открыть календарь">📅</button>
        </div>
      </section>

      <div id="facts-card" class="facts-card hidden" role="dialog" aria-live="polite"></div>

      <div id="calendar-modal" class="modal hidden" aria-hidden="true">
        <div class="modal-backdrop"></div>
        <div class="modal-sheet material-sheet">
          <h3>Календарь (Material Design)</h3>
          <md-outlined-text-field id="material-date-input" type="date" label="Дата" value="2026-02-23" min="2026-02-21" max="2026-02-25"></md-outlined-text-field>
          <div class="sheet-actions">
            <md-text-button id="calendar-clear">Очистить</md-text-button>
            <md-text-button id="calendar-cancel">Отмена</md-text-button>
            <md-filled-button id="calendar-apply">ОК</md-filled-button>
          </div>
        </div>
      </div>

      <div id="desktop-overlay" class="desktop-overlay hidden" role="dialog" aria-modal="false">
        <div class="desktop-overlay-card">
          <h2>Откройте на телефоне</h2>
          <p>Этот прототип оптимизирован только для мобильных устройств</p>
          <button id="desktop-dismiss" class="primary-btn">Продолжить просмотр</button>
        </div>
      </div>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="src/app.js"></script>
  </body>
</html>
